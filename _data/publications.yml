# =============================================================================
#  Publications — single source of truth for /publications/
# =============================================================================
#  This file drives the entire publications page. To keep the site in sync with
#  Google Scholar, edit ONLY this file — the layout, cards, and topical artwork
#  are generated automatically (see _includes/pub-card.html and
#  _includes/pub-thumb.html). Nothing else needs to be touched.
#
#  Each entry under `items:` accepts:
#    title      : full paper title (quote it; titles often contain colons)
#    authors    : verbatim author string; any "B Shang" / "Bo Shang" / "S Bo"
#                 token is auto-bolded as the site owner
#    venue      : journal / conference / repository
#    year       : integer (drives newest-first ordering)
#    type       : journal | conference | preprint | patent | thesis | report | poster | slides
#    topic      : lidar | streetview | uav-inspection | ndt | control | slam | comms | patent
#                 -> selects the animated thumbnail in _includes/pub-thumb.html
#    citations  : integer (0 if none yet)
#    note       : optional short highlight, e.g. "Selected for IEEE IROS 2025"
#    featured   : true to pin into the "Selected & recent" highlight row on /publications/
#    home       : true to surface in the "Selected publications" section on the homepage (/)
#    links      : optional map — any of { doi, arxiv, ssrn, patent, pdf, slides, code, url }
#                 (a Google Scholar button is always added automatically)
#
#  A new paper = one new list entry. Re-ordering is automatic.
# =============================================================================

