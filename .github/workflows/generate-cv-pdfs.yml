name: Build Role CV PDFs (LaTeX)

# Builds the Robotics SWE and ML Engineer CV PDFs from LaTeX sources
# under cv-tex/ and commits the resulting PDFs to assets/. The full
# academic cv.pdf at the repo root assets/cv.pdf is hand-curated and is
# NOT regenerated by this workflow.

on:
  push:
    branches: [master]
    paths:
      - "cv-tex/**"
      - ".github/workflows/generate-cv-pdfs.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            latexmk

      - name: Build PDFs
        working-directory: cv-tex
        run: |
          for role in robotics ml; do
            echo "::group::Build cv-${role}.pdf"
            latexmk -pdf -interaction=nonstopmode -halt-on-error "cv-${role}.tex"
            echo "::endgroup::"
          done
          ls -lh cv-*.pdf

      - name: Stage PDFs into assets/
        run: |
          mkdir -p assets
          cp cv-tex/cv-robotics.pdf assets/cv-robotics.pdf
          cp cv-tex/cv-ml.pdf       assets/cv-ml.pdf
          ls -lh assets/cv-robotics.pdf assets/cv-ml.pdf

      - name: Commit and push if PDFs changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/cv-robotics.pdf assets/cv-ml.pdf
          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "ci: rebuild role-targeted CV PDFs from LaTeX [skip ci]"
          git push origin HEAD:master
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages rebuild
        # The auto pages-build-deployment workflow that fires from a
        # GITHUB_TOKEN-attributed bot push currently fails with
        # "HttpError: Bad credentials" at the deploy step. Trigger our
        # own Pages build to make sure the new PDFs go live.
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pages/builds -X POST

      - name: Upload PDFs as build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdfs
          path: |
            cv-tex/cv-robotics.pdf
            cv-tex/cv-ml.pdf
          if-no-files-found: ignore
